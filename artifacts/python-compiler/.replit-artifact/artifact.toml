kind = "web"
previewPath = "/"
title = "Python Compiler"
version = "1.0.0"
id = "artifacts/python-compiler"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20365

[services.development]
run = "pnpm --filter @workspace/python-compiler run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/python-compiler", "run", "build" ]
publicDir = "artifacts/python-compiler/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20365"
BASE_PATH = "/"
